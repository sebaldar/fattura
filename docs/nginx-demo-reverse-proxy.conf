# ==============================================================================
# Reverse proxy — demo.fattura.mondobimbi.com (demo pubblica, dati fittizi)
#
# Gira nel container `nginx-proxy` (docker-compose separato sul VPS
# reverse-proxy, non fa parte del docker-compose di questo progetto).
# Punta allo stack demo (docker-compose.demo.yml), che gira sullo stesso
# host Docker di produzione (10.10.0.4) ma su porta diversa — 3006 invece
# di 3004 — per evitare conflitti di bind, con Postgres/MariaDB separati
# (volumi pgdata_demo/mariadb_demo_data) e nessun dato reale.
#
# Stesse rotte applicative di fattura.mondobimbi.com (vedi
# nginx-reverse-proxy.conf): /api/auth/*, /api/clienti, /api/documenti
# (incl. /pdf, /xml), /api/emittente, /api/legacy/*.
#
# Stessa logica di cache/security header del vhost di produzione: nessuna
# CSP (script inline Next.js senza nonce), no-cache su sw.js/manifest,
# no-store su /api/, cache immutabile sugli asset con hash.
#
# "log_format main" è assunto definito nell'http{} principale di questo
# host (nginx.conf), non in questo file.
#
# Nome upstream "fattura_demo_frontend": deve essere univoco nell'http{}
# di questo host, distinto da "fattura_frontend" (produzione).
# ==============================================================================

upstream fattura_demo_frontend {
    server 10.10.0.4:3006;
    keepalive 16;
}

# --- HTTP + ACME --------------------------------------------------------------
server {
    listen 80;
    server_name demo.fattura.mondobimbi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ----------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name demo.fattura.mondobimbi.com;

    # Va aggiunto come SAN al certificato esistente (stesso comando usato
    # per fattura.mondobimbi.com, con --expand):
    #   docker compose run --rm certbot certonly --webroot \
    #     -w /var/www/certbot --cert-name www.mondobimbi.com \
    #     -d mondobimbi.com -d www.mondobimbi.com \
    #     -d prodotto.mondobimbi.com -d tessera.mondobimbi.com \
    #     -d vendite.mondobimbi.com -d fattura.mondobimbi.com \
    #     -d demo.fattura.mondobimbi.com --expand
    ssl_certificate     /etc/letsencrypt/live/www.mondobimbi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mondobimbi.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    # Indicizzazione motori di ricerca sconsigliata per un ambiente demo.
    add_header X-Robots-Tag "noindex, nofollow" always;

    server_tokens off;

    access_log /var/log/nginx/demo.fattura.mondobimbi.access.log main;
    error_log  /var/log/nginx/demo.fattura.mondobimbi.error.log warn;

    client_max_body_size 12m;

    location = /sw.js {
        proxy_pass http://fattura_demo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache" always;
    }

    location = /manifest.webmanifest {
        proxy_pass http://fattura_demo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache" always;
    }

    location /api/ {
        proxy_pass http://fattura_demo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        add_header Cache-Control "no-store" always;
    }

    location /_next/static/ {
        proxy_pass http://fattura_demo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://fattura_demo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    location /health {
        allow 10.10.0.0/24;
        allow 127.0.0.1;
        deny all;

        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
