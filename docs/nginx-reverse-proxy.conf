# ==============================================================================
# Reverse proxy — fattura.mondobimbi.com (Fatturazione e-commerce MondoBimbi)
#
# Gira nel container `nginx-proxy` (docker-compose separato sul VPS
# reverse-proxy, non fa parte del docker-compose di questo progetto).
# Il frontend applicativo (container `frontend` del docker-compose di
# questo progetto) è un server Node standalone (Next.js, non nginx: vedi
# frontend/Dockerfile) e pubblica la porta 3004 sull'host che esegue
# `docker compose` — raggiunto via IP dell'interfaccia WireGuard di
# quell'host (qui 10.10.0.4, per coerenza con gli altri servizi sullo
# stesso VPS proxy). Porta diversa da VIEW_PRODUCT (8181) per poter
# coesistere sullo stesso reverse proxy/VPS.
#
# Rotte applicative: /api/auth/{login,logout,me,refresh,totp/activate,
# totp/verify}, /api/clienti, /api/documenti (incl. /pdf, /xml, /righe,
# /emetti, /note-credito), /api/emittente, /api/legacy/{merci,aliquote}.
# Login richiesto (sessione cookie) per tutte le rotte tranne
# /api/auth/login e /api/auth/refresh.
#
# L'app Next.js non imposta CSP né Cache-Control differenziato per
# percorso: questo proxy si occupa sia della terminazione TLS sia di
# queste responsabilità (blocchi dedicati sotto per /api/, /sw.js,
# /manifest.webmanifest e asset statici). I cookie di sessione
# (Set-Cookie dal login, httpOnly/Secure/SameSite=Strict) passano
# inalterati attraverso proxy_pass.
#
# "log_format main" è assunto definito nell'http{} principale di questo
# host (nginx.conf), non in questo file.
#
# Nome upstream "fattura_frontend": deve essere univoco nell'http{} di
# questo host. Se lo stesso reverse proxy serve anche VIEW_PRODUCT
# (upstream "viewproduct_frontend" in prodotto.conf), nomi duplicati fanno
# fallire "nginx -t" con "duplicate upstream".
# ==============================================================================

upstream fattura_frontend {
    server 10.10.0.4:3004;
    keepalive 16;
}

# --- HTTP + ACME --------------------------------------------------------------
server {
    listen 80;
    server_name fattura.mondobimbi.com;

    location /.well-known/acme-challenge/ {
        # Deve corrispondere al webroot effettivamente usato dal client ACME
        # su questo host.
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ----------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name fattura.mondobimbi.com;

    # Default nginx (1m) è troppo basso per le foto di biglietti da visita
    # caricate da smartphone (POST /api/clienti/estrai-foto). Il backend
    # accetta fino a 10MB (MAX_FOTO_BYTES in clienti.ts): margine sopra
    # quel valore, non sotto.
    client_max_body_size 12m;

    # Da verificare su questo host (ls /etc/letsencrypt/live/) prima di
    # attivare: se il certificato di www.mondobimbi.com non copre anche
    # fattura.mondobimbi.com come SAN, va emesso un certificato dedicato
    # (es. certbot --nginx -d fattura.mondobimbi.com) e questi due percorsi
    # aggiornati di conseguenza.
    ssl_certificate     /etc/letsencrypt/live/www.mondobimbi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mondobimbi.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (abilitare se il resolver è raggiungibile dall'host)
    #ssl_stapling on;
    #ssl_stapling_verify on;
    #resolver 1.1.1.1 1.0.0.1 valid=300s;
    #resolver_timeout 5s;

    # HSTS: va qui, non nel container applicativo, perché questo è il punto
    # di terminazione TLS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Header di sicurezza generici, applicati a tutte le risposte (incluse
    # quelle /api/, per cui non fanno danno). Nessuna CSP: l'app Next.js
    # non usa nonce sugli script inline della hydration, una CSP rigida
    # romperebbe il rendering — da introdurre solo insieme a un nonce
    # lato applicativo, non a questo livello.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    server_tokens off;

    access_log /var/log/nginx/fattura.mondobimbi.access.log main;
    error_log  /var/log/nginx/fattura.mondobimbi.error.log warn;

    # Service worker e manifest PWA: mai cache lunga lato browser, altrimenti
    # un aggiornamento del service worker può restare invisibile a lungo.
    location = /sw.js {
        proxy_pass http://fattura_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache" always;
    }

    location = /manifest.webmanifest {
        proxy_pass http://fattura_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache" always;
    }

    # Le risposte API non vanno mai in cache (dati sempre freschi, coerente
    # col service worker dell'app che le esclude a sua volta dalla cache).
    location /api/ {
        proxy_pass http://fattura_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        add_header Cache-Control "no-store" always;
    }

    # Asset statici Next.js con hash nel nome file: cache aggressiva sicura,
    # un contenuto cambiato ha sempre un URL diverso.
    location /_next/static/ {
        proxy_pass http://fattura_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Tutto il resto (shell PWA, pagine, icone) al frontend applicativo.
    location / {
        proxy_pass http://fattura_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # Health check protetto: verifica solo questo nginx, non l'upstream
    # (l'healthcheck del container frontend è già gestito da Docker).
    location /health {
        allow 10.10.0.0/24;
        allow 127.0.0.1;
        deny all;

        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
